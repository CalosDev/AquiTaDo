<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AquiTa.do - Sin conexion</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(160deg, #eff6ff 0%, #ffffff 60%, #fff1f2 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #0f172a;
      }
      .card {
        width: min(560px, 92vw);
        background: #ffffff;
        border: 1px solid #dbeafe;
        border-radius: 16px;
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.1);
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 14px;
        line-height: 1.5;
        color: #334155;
      }
      button {
        border: 0;
        border-radius: 12px;
        background: #0b3a82;
        color: #fff;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Estas sin conexion</h1>
      <p>
        AquiTa.do no pudo cargar datos nuevos en este momento.
        Revisa tu internet y vuelve a intentar.
      </p>
      <button type="button" onclick="window.location.reload()">Reintentar</button>
    </main>
  </body>
</html>
