services:
  db:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: aquita
      POSTGRES_PASSWORD: aquita123
      POSTGRES_DB: aquita_test
    ports:
      - '${QA_DB_PORT:-55432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aquita -d aquita_test']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '${QA_REDIS_PORT:-56379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20
