name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: postgresql://aquita:aquita123@127.0.0.1:55432/aquita_test
      REDIS_URL: redis://127.0.0.1:56379
      JWT_SECRET: ci-super-secret-key-at-least-16
      PORT: 3300
      CORS_ORIGIN: http://127.0.0.1:4173
      THROTTLE_TTL_MS: 60000
      THROTTLE_LIMIT: 120
      PLAYWRIGHT_ADMIN_EMAIL: admin@aquita.do
      PLAYWRIGHT_ADMIN_PASSWORD: admin12345

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start QA services
        run: docker compose -f docker/docker-compose.test.yml up -d --wait

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: QA PR gate
        run: pnpm qa:pr

      - name: Stop QA services
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v --remove-orphans

  release-gates:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PLAYWRIGHT_ADMIN_EMAIL: admin@aquita.do
      PLAYWRIGHT_ADMIN_PASSWORD: admin12345
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: QA release gate
        run: pnpm qa:release
